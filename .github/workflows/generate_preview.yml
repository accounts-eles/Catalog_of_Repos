name: Generate Repository Social Preview Card

on:
  push:
    branches:
      - main
  schedule:
    # Nightly at midnight Sydney time (AEST = UTC+10)
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  generate_preview_card:
    # Prevents infinite loop when the action commits the new files
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Chromium System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libxkbcommon-x11-0 libgbm-dev libasound2t64

      - name: Install Node Dependencies
        run: npm install

      - name: Install Puppeteer Browser
        run: npx puppeteer browsers install chrome

      # ── STEP A: Generate thumbnails (existing, unchanged) ──
      - name: Generate Preview Images
        run: node generate_preview_script.js
        env:
          ORG_PAT_TOKEN: ${{ secrets.ORG_PAT_TOKEN }}

      # ── STEP B: Commit updated thumbnails ──
      - name: Commit updated thumbnails
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: Auto-generated social media preview cards'
          file_pattern: 'previews/*.png'
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - name: Report thumbnail status
        if: steps.commit.outputs.changes_detected == 'true'
        run: echo "Successfully generated and committed preview files."

      - name: Report no thumbnail changes
        if: steps.commit.outputs.changes_detected == 'false'
        run: echo "No thumbnail changes detected."

      # ── STEP C: Sync catalog to WooCommerce (new) ──
      - name: Sync catalog to WooCommerce
        run: node sync_woocommerce.js
        env:
          ORG_PAT_TOKEN: ${{ secrets.ORG_PAT_TOKEN }}
          WOOCOMMERCE_URL: ${{ secrets.WOOCOMMERCE_URL }}
          WOOCOMMERCE_CONSUMER_KEY: ${{ secrets.WOOCOMMERCE_CONSUMER_KEY }}
          WOOCOMMERCE_CONSUMER_SECRET: ${{ secrets.WOOCOMMERCE_CONSUMER_SECRET }}
